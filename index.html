<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>预约点击进入</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
      background: #efefef;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Screens ─────────────────────────────────── */
    .screen {
      position: fixed;
      inset: 0;
      display: none;
      flex-direction: column;
    }
    .screen.active { display: flex; }

    /* ── SCREEN 1: 跳转页 ─────────────────────────── */
    #s1 { background: #efefef; }

    .topbar {
      background: #fff;
      border-bottom: 0.5px solid #ddd;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }
    .topbar-back {
      font-size: 24px;
      color: #222;
      line-height: 1;
      padding-right: 10px;
    }
    .topbar-title {
      flex: 1;
      font-size: 17px;
      font-weight: 600;
      color: #111;
      text-align: center;
    }
    .topbar-icons {
      display: flex;
      gap: 16px;
      align-items: center;
      color: #222;
    }

    .ssl-bar {
      background: #fff;
      border-bottom: 0.5px solid #ebebeb;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: #666;
      flex-shrink: 0;
    }
    .ssl-dot {
      flex-shrink: 0;
      width: 16px;
      height: 16px;
      background: #27ae60;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Middle: app icons centered */
    .mid-zone {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app-row {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .app-icon {
      width: 74px;
      height: 74px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 3px 14px rgba(0,0,0,0.18);
      flex-shrink: 0;
    }
    .dots-wrap { display: flex; gap: 5px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #c4c4c4; }

    /* Bottom section: button + hint */
    .bot-zone {
      padding: 0 24px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .go-btn {
      width: 100%;
      background: #07C160;
      color: #fff;
      font-size: 17px;
      font-weight: 600;
      padding: 15px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.5px;
      box-shadow: 0 4px 18px rgba(7,193,96,0.35);
      transition: opacity 0.15s;
    }
    .go-btn:active { opacity: 0.85; }
    .bot-hint {
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }

    /* Dialog */
    .mask {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.46);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .mask.show {
      opacity: 1;
      pointer-events: all;
    }
    .dialog {
      background: #fff;
      border-radius: 14px;
      width: 270px;
      overflow: hidden;
      transform: scale(0.92);
      transition: transform 0.22s cubic-bezier(.34,1.56,.64,1);
    }
    .mask.show .dialog { transform: scale(1); }
    .dlg-body {
      padding: 22px 20px 16px;
      text-align: center;
    }
    .dlg-title { font-size: 17px; font-weight: 600; color: #111; margin-bottom: 8px; }
    .dlg-text  { font-size: 14px; color: #555; line-height: 1.5; }
    .dlg-foot  { display: flex; border-top: 0.5px solid #e0e0e0; }
    .dlg-foot button {
      flex: 1;
      padding: 13px;
      font-size: 17px;
      background: none;
      border: none;
      cursor: pointer;
    }
    .dlg-cancel { color: #333; border-right: 0.5px solid #e0e0e0; }
    .dlg-open   { color: #07C160; font-weight: 600; }

    /* ── SCREEN 2: 二维码页 ──────────────────────── */
    #s2 {
      background: #fff;
      align-items: center;
      justify-content: center;
    }
    .qr-card {
      border: 1.5px solid #e4e4e4;
      border-radius: 12px;
      padding: 20px 20px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 268px;
    }
    .wc-badge {
      align-self: flex-start;
      width: 36px;
      height: 36px;
      background: #07C160;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
    }

    /*
    ╔══════════════════════════════════════════════╗
    ║  替换区域：将 src 改为你的真实二维码图片链接   ║
    ║  Replace src with your own QR code image URL  ║
    ╚══════════════════════════════════════════════╝
    */
    .qr-img {
      width: 208px;
      height: 208px;
      display: block;
      object-fit: contain;
    }

    .qr-label {
      margin-top: 14px;
      font-size: 15px;
      font-weight: 700;
      color: #e53935;
      letter-spacing: 0.3px;
      text-align: center;
    }

    /* Fade transition between screens */
    #s2 { opacity: 0; transition: opacity 0.35s; }
    #s2.active { opacity: 1; }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════════
     SCREEN 1 · 跳转引导页
════════════════════════════════════════════ -->
<div id="s1" class="screen active">

  <!-- Top bar -->
  <div class="topbar">
    <span class="topbar-back">‹</span>
    <span class="topbar-title">预约点击进入</span>
    <div class="topbar-icons">
      <!-- Search -->
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="7.5"/>
        <line x1="20" y1="20" x2="16" y2="16"/>
      </svg>
      <!-- More (···) -->
      <svg width="20" height="5" viewBox="0 0 20 5" fill="currentColor">
        <circle cx="2.5" cy="2.5" r="2.2"/>
        <circle cx="10"  cy="2.5" r="2.2"/>
        <circle cx="17.5" cy="2.5" r="2.2"/>
      </svg>
    </div>
  </div>

  <!-- SSL notice -->
  <div class="ssl-bar">
    <div class="ssl-dot">
      <svg width="9" height="11" viewBox="0 0 9 11" fill="none">
        <path d="M4.5 0L0.5 2V5c0 2.76 1.71 5.24 4 5.95C7.29 10.24 8.5 7.76 8.5 5V2L4.5 0Z" fill="white"/>
      </svg>
    </div>
    <span>本链接已经过SSL安全加密，请放心点击</span>
  </div>

  <!-- App icons (TikTok → ··· → WeChat) -->
  <div class="mid-zone">
    <div class="app-row">

      <!-- TikTok Icon -->
      <div class="app-icon">
        <svg viewBox="0 0 74 74" xmlns="http://www.w3.org/2000/svg" width="74" height="74">
          <rect width="74" height="74" fill="#010101"/>
          <!-- Cyan shadow layer -->
          <path d="M45.5 18.5c1.8 5.5 6 8.8 10.8 9v8.4c-3.8 0-7.4-1.3-10.5-3.5V45c0 7.7-6.2 14-13.8 14S18 52.7 18 45s6.2-14 13.8-14c.6 0 1.1 0 1.6.07V39.6c-.5-.08-1-.12-1.6-.12-3.1 0-5.5 2.5-5.5 5.5s2.4 5.5 5.5 5.5 5.5-2.5 5.5-5.5V18.5h8.2Z"
            fill="#25d0c9" opacity="0.55"/>
          <!-- Red shadow layer -->
          <path d="M46 19c1.8 5.5 6 8.8 10.8 9v8.4c-3.8 0-7.4-1.3-10.5-3.5v13c0 7.7-6.2 14-13.8 14S18.7 53.6 18.7 45.9s6.2-14 13.8-14c.6 0 1.1 0 1.6.07V40.5c-.5-.08-1-.12-1.6-.12-3.1 0-5.5 2.5-5.5 5.5s2.4 5.5 5.5 5.5 5.5-2.5 5.5-5.5V19H46Z"
            fill="#fe2c55" opacity="0.45"/>
          <!-- White main shape -->
          <path d="M45.5 19c1.8 5.5 6 8.8 10.8 9v8.4c-3.8 0-7.4-1.3-10.5-3.5V46c0 7.7-6.2 14-13.8 14S18 53.7 18 46s6.2-14 13.8-14c.6 0 1.1 0 1.6.07V40.6c-.5-.08-1-.12-1.6-.12-3.1 0-5.5 2.5-5.5 5.5s2.4 5.5 5.5 5.5 5.5-2.5 5.5-5.5V19h8.2Z"
            fill="white"/>
        </svg>
      </div>

      <!-- Dots separator -->
      <div class="dots-wrap">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <!-- WeChat Icon -->
      <div class="app-icon">
        <svg viewBox="0 0 74 74" xmlns="http://www.w3.org/2000/svg" width="74" height="74">
          <rect width="74" height="74" fill="#07C160"/>
          <!-- Large bubble (left) -->
          <ellipse cx="32" cy="34" rx="16" ry="12.5" fill="white"/>
          <!-- Small bubble (right/bottom) -->
          <ellipse cx="47" cy="41" rx="13" ry="10" fill="white" opacity="0.92"/>
          <!-- Eyes on large bubble -->
          <circle cx="26.5" cy="34" r="2.2" fill="#07C160"/>
          <circle cx="34.5" cy="34" r="2.2" fill="#07C160"/>
          <!-- Eyes on small bubble -->
          <circle cx="42" cy="41"   r="1.8" fill="#07C160"/>
          <circle cx="49.5" cy="41" r="1.8" fill="#07C160"/>
        </svg>
      </div>

    </div>
  </div>

  <!-- Button + hint -->
  <div class="bot-zone">
    <button class="go-btn" id="goBtn">点击立即前往</button>
    <p class="bot-hint">如无法打开，请复制链接到浏览器打开</p>
  </div>

</div><!-- /s1 -->

<!-- ════════════════════════════════════════════
     DIALOG · 提示弹窗
════════════════════════════════════════════ -->
<div class="mask" id="mask">
  <div class="dialog">
    <div class="dlg-body">
      <p class="dlg-title">提示</p>
      <p class="dlg-text">即将离开抖音，打开其他应用</p>
    </div>
    <div class="dlg-foot">
      <button class="dlg-cancel" id="btnCancel">取消</button>
      <button class="dlg-open"   id="btnOpen">打开</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════
     SCREEN 2 · 二维码页
════════════════════════════════════════════ -->

  <div class="qr-card">

    <!-- WeChat badge -->

      <svg width="24" height="20" viewBox="0 0 24 20" fill="none">
        <ellipse cx="9.5" cy="8.5" rx="9" ry="7" fill="white"/>
        <ellipse cx="18" cy="13" rx="6.5" ry="5.5" fill="white" opacity="0.9"/>
        <circle cx="6.5" cy="8.5" r="1.6" fill="#07C160"/>
        <circle cx="12"  cy="8.5" r="1.6" fill="#07C160"/>
        <circle cx="15.5" cy="13" r="1.3" fill="#07C160"/>

<script>
  const goBtn     = document.getElementById('goBtn');
  const mask      = document.getElementById('mask');
  const btnCancel = document.getElementById('btnCancel');
  const btnOpen   = document.getElementById('btnOpen');
  const s1        = document.getElementById('s1');
  const s2        = document.getElementById('s2');
  const qrImg     = document.getElementById('qrImg');
  const qrPH      = document.getElementById('qrPlaceholder');

  /* Handle QR image: show placeholder if src is empty or fails */
  function initQR() {
    const src = qrImg.getAttribute('src');
    if (!src) {
      qrImg.style.display = 'none';
      qrPH.style.display  = 'block';
      qrPH.style.width    = '208px';
      qrPH.style.height   = '208px';
      qrImg.parentNode.insertBefore(qrPH, qrImg);
    }
  }
  qrImg.addEventListener('error', () => {
    qrImg.style.display = 'none';
    qrPH.style.display  = 'block';
    qrPH.style.width    = '208px';
    qrPH.style.height   = '208px';
    if (!qrPH.parentNode || qrPH.parentNode !== qrImg.parentNode) {
      qrImg.parentNode.insertBefore(qrPH, qrImg);
    }
  });
  initQR();

  /* Show dialog */
  goBtn.addEventListener('click', () => {
    mask.classList.add('show');
  });

  /* Cancel */
  btnCancel.addEventListener('click', () => {
    mask.classList.remove('show');
  });

  /* Open: attempt WeChat deep-link, fallback to QR screen */
  btnOpen.addEventListener('click', () => {
    // Try to open WeChat
    window.location.href = 'weixin://';
    // After 1.5 s, show QR screen (fallback for in-app browsers)
    setTimeout(goToQR, 1500);
  });

  /* Close dialog if tapping the backdrop */
  mask.addEventListener('click', (e) => {
    if (e.target === mask) mask.classList.remove('show');
  });

  function goToQR() {
    mask.classList.remove('show');
    s1.classList.remove('active');
    s2.classList.add('active');
  }
</script>
